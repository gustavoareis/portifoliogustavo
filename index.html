<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <title>Portfolio</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    #home {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: rgba(0, 0, 0, 0.2);
    }

    .content {
      max-width: 64rem;
      padding: 0 1rem 1rem;
      font-size: 1.5rem;
      line-height: 1.25;
    }

    .tag {
      color: #2dd4bf;
      letter-spacing: 0.025em;
    }

    h1 {
      padding-left: 2rem;
      font-size: 2.25rem;
      letter-spacing: -0.05em;
      font-weight: 500;
    }

    .subtitle {
      padding-left: 2rem;
      font-size: 1.875rem;
      letter-spacing: -0.05em;
      font-weight: 500;
    }

    .cursor {
      display: inline-block;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @media (min-width: 640px) {
      h1 {
        font-size: 3rem;
      }

      .subtitle {
        font-size: 2.25rem;
      }
    }

    @media (min-width: 1024px) {
      .content {
        padding: 0 0.5rem 1rem;
      }

      h1 {
        font-size: 3.75rem;
      }

      .subtitle {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>
  <video autoplay loop playsinline class="bg-video" aria-hidden="true">
    <source src="" type="video/webm" />
  </video>

  <section id="home">
    <div class="content">
      <span class="tag">&lt;h1&gt;</span>
      <h1><span id="typewriter"></span><span class="cursor">|</span></h1>
      <span class="tag">&lt;/h1&gt;</span><br />
      <span class="tag">&lt;p&gt;</span>
      <p class="subtitle">Full&#8209;stack web developer and digital wizard, crafting code and automating the future.
      </p>
      <span class="tag">&lt;/p&gt;</span>
    </div>
  </section>
  <script>
    const text = "Hi there! I'm Gustavo,";
    const el = document.getElementById('typewriter');
    let i = 0;
    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(type, 80);
      }
    }
    type();
  </script>
</body>

</html>
